version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
    container_name: knowledge-assistant-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - ./frontend/.env.local
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: knowledge-assistant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
