services:
  # ── Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
    container_name: knowledge-assistant-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: knowledge-assistant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    networks:
      - app-network

  # ── Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-assistant-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - qdrant
    networks:
      - app-network

  # ── Databases ─────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: knowledge-assistant-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant
    container_name: knowledge-assistant-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

volumes:
  mongo_data:
  qdrant_data:

networks:
  app-network:
    driver: bridge
